services:
  - type: web
    name: loginapp-payments-backend
    env: node
    rootDir: backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PAGARME_BASE_URL
        value: https://api.pagar.me/core/v5
      - key: CORS_ORIGIN
        value: "*"
      - key: PAGARME_SECRET_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
